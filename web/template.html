<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>{{title}}</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f7f8fa;
      --text: #1f2328;
      --muted: #656d76;
      --border: #d0d7de;
      --accent: #2f6feb;
      --maxw: 720px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --text: #e6edf3;
        --muted: #9198a1;
        --border: #30363d;
        --accent: #6ea8ff;
      }
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
        "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      line-height: 1.8;
      font-size: 16px;
    }
    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 48px 20px 96px;
    }
    main { word-wrap: break-word; overflow-wrap: break-word; }
    h1 {
      font-size: 1.9rem;
      line-height: 1.3;
      margin: 0 0 1.5rem;
      padding-bottom: 0.6rem;
      border-bottom: 2px solid var(--border);
    }
    h2 {
      font-size: 1.3rem;
      margin: 2.4rem 0 0.9rem;
    }
    h3 { font-size: 1.1rem; margin: 1.8rem 0 0.6rem; }
    p { margin: 0.9rem 0; }
    ul, ol { margin: 0.9rem 0; padding-left: 1.5rem; }
    li { margin: 0.4rem 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    strong { font-weight: 600; }
    code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1em 0.4em;
      font-size: 0.88em;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    blockquote {
      margin: 1rem 0;
      padding: 0.2rem 1rem;
      border-left: 4px solid var(--border);
      color: var(--muted);
    }
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }
    footer {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 0 20px 48px;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main>
{{content}}
    </main>
  </div>
  <footer>© {{year}} Mezaru</footer>
</body>
</html>
